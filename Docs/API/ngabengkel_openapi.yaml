      requestBody:
        required: true
        content:
          application/json:
            schema: { $ref: '#/components/schemas/UploadProgressRequest' }
      responses:
        '201':
          content:
            application/json:
              schema: { $ref: '#/components/schemas/Progress' }
        '400': { $ref: '#/components/responses/BadRequest' }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '403': { $ref: '#/components/responses/Forbidden' }

  /work-orders/{wo_id}/suspend:
    parameters:
      - name: wo_id
        in: path
        required: true
        schema: { type: string, format: uuid }
    post:
      tags: [Work Order]
