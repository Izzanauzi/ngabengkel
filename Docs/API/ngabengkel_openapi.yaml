      tags: [Work Order]
      summary: Customer menyetujui tindakan tambahan
      responses:
        '200':
          content:
            application/json:
              example: { message: "Tindakan disetujui, WO dilanjutkan" }
        '401': { $ref: '#/components/responses/Unauthorized' }
        '404': { $ref: '#/components/responses/NotFound' }

  /work-orders/{wo_id}/reject-action:
    parameters:
